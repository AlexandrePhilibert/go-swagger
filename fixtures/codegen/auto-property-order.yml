  version: 0.0.1
  title: Test for auto property order
schemes:
  - http
paths:
  /test:
    get:
      summary: Test endpoint
      responses:
        '200':
          description: successful operation
          schema:
            $ref: '#/definitions/orderedModel'

definitions:
  orderedModel:
    type: object
    properties:
      zeta:
