      alpha:
        type: string
      mu:
        type: integer
        format: int64
      beta:
        type: string
      epsilon:
        type: boolean
  nestedModel:
    type: object
    properties:
      charlie:
        type: string
      able:
        type: string
      innerObj:
        type: object
        properties:
          zebra:
            type: string
          apple:
            type: string
          mango:
            type: string
  mixedModel:
    type: object
    properties:
      noOrderZ:
        type: string
      explicitSecond:
        x-order: 1
        type: string
      noOrderA:
        type: string
      explicitFirst:
        x-order: 0
